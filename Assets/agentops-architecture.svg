<svg viewBox="0 0 820 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, sans-serif" role="img" aria-label="GameDev AgentOps 아키텍처">
  <rect x="0" y="0" width="820" height="720" rx="0" fill="#232327"/>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6066"/></marker>
    <marker id="ahl" markerWidth="9" markerHeight="9" refX="0" refY="3" orient="auto"><path d="M6,0 L0,3 L6,6 Z" fill="#5b6066"/></marker>
    <marker id="ahs" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#c08fd0"/></marker>
  </defs>

  <text x="20" y="30" font-size="16" font-weight="700" fill="#e6e6ea">GameDev AgentOps — 아키텍처</text>
  <text x="800" y="28" text-anchor="end" font-size="10.5" fill="#c08fd0">보라 = 멀티에이전트</text>

  <!-- Region 1 -->
  <rect x="12" y="46" width="796" height="412" rx="10" fill="none" stroke="#3d3d44" stroke-dasharray="4 3"/>
  <text x="26" y="66" font-size="12" font-weight="700" fill="#e6e6ea">① Unity Editor — 에이전트 코어</text>

  <rect x="40" y="80" width="330" height="54" rx="8" fill="#2c2c31" stroke="#45454d" stroke-width="1.5"/>
  <text x="56" y="102" font-size="12.5" font-weight="600" fill="#e6e6ea">AgentChatWindow</text>
  <text x="56" y="119" font-size="10" fill="#a9a9b2">UI Toolkit · 모드 드롭다운 · 새대화/저장/불러오기</text>

  <rect x="40" y="158" width="330" height="80" rx="8" fill="#2c2c31" stroke="#5b9ded" stroke-width="1.8"/>
  <text x="56" y="180" font-size="12.5" font-weight="700" fill="#e6e6ea">Agent Loop (RunAgent)</text>
  <text x="56" y="199" font-size="9.5" fill="#bfbfc6">Claude 호출 → tool_use? → 도구 실행 → 반복</text>
  <text x="56" y="214" font-size="9.5" fill="#bfbfc6">도구 안 부르면 end_turn = 최종 답변</text>
  <text x="56" y="229" font-size="9.5" fill="#bfbfc6">system 프롬프트(역할+Skills) · 멀티턴 history</text>

  <rect x="470" y="162" width="300" height="56" rx="8" fill="#2c2c31" stroke="#45454d" stroke-width="1.5"/>
  <text x="486" y="185" font-size="12.5" font-weight="600" fill="#e6e6ea">Claude Messages API</text>
  <text x="486" y="202" font-size="10" fill="#a9a9b2">api.anthropic.com · x-api-key · tool_use</text>

  <rect x="95" y="262" width="220" height="44" rx="8" fill="#2c2c31" stroke="#5b9ded" stroke-width="1.5"/>
  <text x="111" y="283" font-size="12" font-weight="600" fill="#e6e6ea">HITL 승인 게이트</text>
  <text x="111" y="298" font-size="9.5" fill="#bfbfc6">write 도구만 · 허용/거부</text>

  <rect x="40" y="326" width="330" height="84" rx="8" fill="#2c2c31" stroke="#45454d" stroke-width="1.5"/>
  <text x="56" y="348" font-size="12.5" font-weight="600" fill="#e6e6ea">UnityTools — Unity 도구</text>
  <text x="56" y="366" font-size="9.5" fill="#bfbfc6">읽기: 씬·콘솔로그·컴파일에러·파일·load_skill</text>
  <text x="56" y="381" font-size="9.5" fill="#bfbfc6">쓰기: GameObject 생성 · 파일 쓰기 (승인)</text>
  <text x="56" y="396" font-size="9.5" fill="#bfbfc6">+ AgentOpsLog: 콘솔/컴파일 로그 수집</text>

  <rect x="470" y="248" width="300" height="40" rx="7" fill="#2c2c31" stroke="#45454d" stroke-width="1.2"/>
  <text x="484" y="273" font-size="10.5" fill="#d6d6dc">AgentProfiles · 모드별 도구 권한 (최소권한)</text>
  <rect x="470" y="298" width="300" height="40" rx="7" fill="#2c2c31" stroke="#45454d" stroke-width="1.2"/>
  <text x="484" y="323" font-size="10.5" fill="#d6d6dc">SkillRegistry · Skills/*.md (필요할 때 로딩)</text>
  <rect x="470" y="348" width="300" height="40" rx="7" fill="#2c2c31" stroke="#45454d" stroke-width="1.2"/>
  <text x="484" y="373" font-size="10.5" fill="#d6d6dc">AgentSession ⇄ 영속 (SessionState · 파일)</text>
  <rect x="470" y="398" width="300" height="40" rx="7" fill="#2c2c31" stroke="#45454d" stroke-width="1.2"/>
  <text x="484" y="423" font-size="10.5" fill="#d6d6dc">AgentOpsSettings ⇄ EditorPrefs (API 키)</text>

  <path d="M205,134 L205,156" fill="none" stroke="#5b6066" stroke-width="1.5" marker-end="url(#ah)"/>
  <path d="M372,188 L466,188" fill="none" stroke="#5b6066" stroke-width="1.5" marker-end="url(#ah)" marker-start="url(#ahl)"/>
  <text x="419" y="182" text-anchor="middle" font-size="9" fill="#a9a9b2">요청 ↔ 응답</text>
  <path d="M170,238 L170,260" fill="none" stroke="#5b6066" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="176" y="253" font-size="9" fill="#a9a9b2">tool_use</text>
  <path d="M205,306 L205,324" fill="none" stroke="#5b6066" stroke-width="1.5" marker-end="url(#ah)"/>
  <path d="M40,368 C20,368 20,212 38,212" fill="none" stroke="#5b6066" stroke-width="1.3" marker-end="url(#ah)"/>
  <text x="14" y="294" font-size="8.5" fill="#a9a9b2" transform="rotate(-90 14 294)">tool_result 반복</text>

  <!-- Region 2 -->
  <rect x="12" y="478" width="796" height="228" rx="10" fill="#c08fd0" fill-opacity="0.06" stroke="#c08fd0" stroke-width="1.5"/>
  <text x="26" y="500" font-size="12" font-weight="700" fill="#c08fd0">② 멀티에이전트 위임</text>

  <rect x="50" y="526" width="200" height="66" rx="8" fill="#2c2c31" stroke="#c08fd0" stroke-width="1.8"/>
  <text x="66" y="550" font-size="12.5" font-weight="700" fill="#e6e6ea">Coordinator 모드</text>
  <text x="66" y="567" font-size="9.5" fill="#bfbfc6">직접 안 함 · delegate 로</text>
  <text x="66" y="581" font-size="9.5" fill="#bfbfc6">위임하고 결과 종합</text>

  <rect x="380" y="514" width="210" height="46" rx="8" fill="#2c2c31" stroke="#c08fd0" stroke-width="1.4"/>
  <text x="396" y="535" font-size="11.5" font-weight="600" fill="#e6e6ea">Triage sub-agent</text>
  <text x="396" y="550" font-size="9" fill="#bfbfc6">읽기 도구만 · 독립 세션</text>
  <rect x="380" y="574" width="210" height="46" rx="8" fill="#2c2c31" stroke="#c08fd0" stroke-width="1.4"/>
  <text x="396" y="595" font-size="11.5" font-weight="600" fill="#e6e6ea">Builder sub-agent</text>
  <text x="396" y="610" font-size="9" fill="#bfbfc6">쓰기 도구 · 독립 세션</text>

  <path d="M250,550 C310,550 320,537 378,537" fill="none" stroke="#c08fd0" stroke-width="1.6" marker-end="url(#ahs)"/>
  <path d="M250,568 C310,568 320,597 378,597" fill="none" stroke="#c08fd0" stroke-width="1.6" marker-end="url(#ahs)"/>
  <text x="300" y="529" font-size="9" fill="#c08fd0">delegate(task) ▶</text>

  <text x="620" y="536" font-size="9.5" fill="#bfbfc6">각 sub = RunAgent 중첩 실행</text>
  <text x="620" y="551" font-size="9.5" fill="#bfbfc6">(yield return RunAgent)</text>
  <text x="620" y="570" font-size="9.5" fill="#bfbfc6">독립 세션에서 처리하고</text>
  <text x="620" y="585" font-size="9.5" fill="#bfbfc6">결론만 Coordinator에 반환</text>
  <text x="620" y="604" font-size="9" fill="#c08fd0">→ context 격리 (핵심)</text>
</svg>
